<!-- page/contact.html -->

<section
    class="contact-page"
    id="contact"
>

    <div class="header">
        <h1>CONTACT</h1>
        <p>ติดต่อและพูดคุยกับเรา</p>
    </div>

    <div class="contact-container">
        <!-- LEFT -->
        <div class="contact-info">
            <div class="contact-card">
                <h2>CAFFE DE TERINE</h2>
                <p>
                    ร้านกาแฟสไตล์ Luxury Minimal
                    ที่ตั้งใจสร้างประสบการณ์
                    ผ่านกลิ่น รสชาติ และบรรยากาศ
                    อันเรียบหรูและอบอุ่น
                </p>
            </div>

            <div class="contact-card">
                <h3>Location</h3>
                <p>Bangkok, Thailand</p>
            </div>

            <div class="contact-card">
                <h3>Email</h3>
                <p>caffedeterine@example.com</p>

            </div>

            <div class="contact-card">

                <h3>
                    Phone
                </h3>

                <p>
                    +66 00 000 0000
                </p>

            </div>

        </div>

        <!-- RIGHT -->
        <div class="contact-form-wrapper">

            <form class="contact-form">

                <div class="form-group">

                    <label>
                        ชื่อของคุณ
                    </label>

                    <input
                        type="text"
                        placeholder="Your Name"
                    >

                </div>

                <div class="form-group">

                    <label>
                        อีเมล
                    </label>

                    <input
                        type="email"
                        placeholder="Your Email"
                    >

                </div>

                <div class="form-group">

                    <label>
                        ข้อความ
                    </label>

                    <textarea
                        rows="6"
                        placeholder="Write your message..."
                    ></textarea>

                </div>

                <button
                    type="submit"
                    class="btn-buy"
                >
                    ส่งข้อความ
                </button>

            </form>

        </div>

    </div>

</section>
